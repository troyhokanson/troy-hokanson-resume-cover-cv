name: Build Reference Document

# Runs on every push to main and on manual trigger
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-reference:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate public AI-ready repository setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib import request

          owner_repo = os.environ["GITHUB_REPOSITORY"]
          owner, repo = owner_repo.split("/", 1)

          api_req = request.Request(
              f"https://api.github.com/repos/{owner}/{repo}",
              headers={
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github+json",
              },
          )
          with request.urlopen(api_req, timeout=20) as response:
              repo_meta = json.load(response)

          if repo_meta.get("private", True):
              raise SystemExit("Repository must be public so AI tools can fetch standards via raw GitHub URLs.")

          required_files = [
              "HEADER_STANDARD.md",
              "VOICE_STANDARD.md",
              "SYSTEM_PROMPT.md",
              "PLATFORM_SETUP.md",
              "chatgpt_action_schema.json",
          ]
          for rel in required_files:
              if not Path(rel).is_file():
                  raise SystemExit(f"Required AI setup file is missing: {rel}")

          with open("chatgpt_action_schema.json", "r", encoding="utf-8") as handle:
              schema = json.load(handle)
          if "openapi" not in schema or "paths" not in schema:
              raise SystemExit("chatgpt_action_schema.json must include OpenAPI metadata and paths for AI Actions.")

          raw_checks = [
              "HEADER_STANDARD.md",
              "VOICE_STANDARD.md",
          ]
          for rel in raw_checks:
              raw_url = f"https://raw.githubusercontent.com/{owner}/{repo}/{os.environ['GITHUB_SHA']}/{rel}"
              with request.urlopen(raw_url, timeout=20) as response:
                  if response.status != 200:
                      raise SystemExit(f"Raw file is not publicly accessible: {raw_url}")
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up workspace structure
        # The build scripts expect the repo to be importable as the 'templates'
        # package (e.g. from templates.docx_header import ...).
        # Create a workspace directory and symlink the repo into it as templates/.
        run: |
          mkdir -p /home/runner/workspace
          ln -s "$GITHUB_WORKSPACE" /home/runner/workspace/templates

      - name: Build reference header DOCX
        # Contact info is injected from GitHub Actions Secrets — never hardcoded.
        # Add these secrets under: Settings -> Secrets and variables -> Actions
        #   TROY_PHONE, TROY_EMAIL, TROY_LOCATION, TROY_LINKEDIN, TROY_PORTFOLIO
        working-directory: /home/runner/workspace
        env:
          TROY_PHONE:     ${{ secrets.TROY_PHONE }}
          TROY_EMAIL:     ${{ secrets.TROY_EMAIL }}
          TROY_LOCATION:  ${{ secrets.TROY_LOCATION }}
          TROY_LINKEDIN:  ${{ secrets.TROY_LINKEDIN }}
          TROY_PORTFOLIO: ${{ secrets.TROY_PORTFOLIO }}
          TROY_NAME:      ${{ secrets.TROY_NAME }}
        run: python templates/build_reference.py

      - name: Run unit tests
        working-directory: /home/runner/workspace
        env:
          TROY_PHONE:     ${{ secrets.TROY_PHONE }}
          TROY_EMAIL:     ${{ secrets.TROY_EMAIL }}
          TROY_LOCATION:  ${{ secrets.TROY_LOCATION }}
          TROY_LINKEDIN:  ${{ secrets.TROY_LINKEDIN }}
          TROY_PORTFOLIO: ${{ secrets.TROY_PORTFOLIO }}
          TROY_NAME:      ${{ secrets.TROY_NAME }}
        run: python -m pytest templates/tests/ -v

      - name: Upload reference DOCX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-header
          path: reference_header.docx
          retention-days: 30
